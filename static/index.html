<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Approval Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border-strong: #c8c6bc;
    --text: #1a1a18;
    --text-muted: #6b6960;
    --text-hint: #9c9a91;
    --accent: #1a1a18;
    --green-bg: #eaf3de;
    --green-border: #97c459;
    --green-text: #27500a;
    --green-fill: #639922;
    --red-bg: #fcebeb;
    --red-border: #f09595;
    --red-text: #501313;
    --red-fill: #a32d2d;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 1rem 4rem;
  }

  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: #0f0e0b;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 52px; margin: 0 -1rem 2rem;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Serif Display', serif;
    font-size: 16px; color: #fff; text-decoration: none;
  }
  .nav-brand-dot { width: 6px; height: 6px; border-radius: 50%; background: #b5860d; }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-user { font-size: 13px; color: rgba(255,255,255,0.55); }
  .nav-user span { color: #fff; font-weight: 500; }
  .nav-logout {
    font-size: 12px; color: rgba(255,255,255,0.4);
    background: none; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; padding: 5px 12px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .nav-logout:hover { background: rgba(255,255,255,0.08); color: #fff; }

  .app { max-width: 680px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 2.5rem; }
  .logo {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 16px;
    font-family: 'Courier New', monospace; font-size: 11px;
    color: var(--text-muted); margin-bottom: 1.5rem;
    letter-spacing: 0.06em;
  }
  .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-fill); }
  h1 {
    font-size: 32px; font-weight: normal; letter-spacing: -0.02em;
    color: var(--text); margin-bottom: 8px;
  }
  .tagline { font-size: 15px; color: var(--text-muted); font-style: italic; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 12px;
  }

  .card-title {
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-hint); margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--border); padding-bottom: 10px;
  }

  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-family: 'Courier New', monospace;
    font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em;
  }

  input, select {
    height: 40px; padding: 0 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-size: 14px; font-family: 'Georgia', serif;
    width: 100%; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none; -webkit-appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--border-strong);
    box-shadow: 0 0 0 3px rgba(26,26,24,0.07);
    background: var(--surface);
  }

  .accuracy-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Courier New', monospace; font-size: 11px;
    color: var(--green-text); background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: 100px; padding: 4px 12px;
    margin-bottom: 1rem;
  }

  .submit-btn {
    width: 100%; height: 50px;
    background: var(--accent); color: #ffffff;
    border: none; border-radius: var(--radius);
    font-family: 'Courier New', monospace;
    font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Result */
  .result-card {
    border-radius: var(--radius);
    padding: 1.75rem; margin-top: 12px;
    display: none; animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .result-approved { background: var(--green-bg); border: 1px solid var(--green-border); }
  .result-rejected { background: var(--red-bg); border: 1px solid var(--red-border); }

  .result-top { display: flex; align-items: center; gap: 16px; margin-bottom: 1.25rem; }
  .result-icon {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: bold; flex-shrink: 0;
  }
  .result-approved .result-icon { background: var(--green-fill); color: white; }
  .result-rejected .result-icon { background: var(--red-fill); color: white; }

  .result-verdict {
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px;
  }
  .result-approved .result-verdict { color: var(--green-fill); }
  .result-rejected .result-verdict { color: var(--red-fill); }

  .result-headline { font-size: 22px; font-weight: normal; letter-spacing: -0.01em; }
  .result-approved .result-headline { color: var(--green-text); }
  .result-rejected .result-headline { color: var(--red-text); }

  .prob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .prob-box {
    border-radius: var(--radius-sm); padding: 12px 14px;
    border: 1px solid rgba(0,0,0,0.07);
  }
  .result-approved .prob-box { background: rgba(255,255,255,0.5); }
  .result-rejected .prob-box { background: rgba(255,255,255,0.5); }
  .prob-label {
    font-family: 'Courier New', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .result-approved .prob-label { color: var(--green-fill); }
  .result-rejected .prob-label { color: var(--red-fill); }
  .prob-value { font-size: 24px; font-weight: normal; }
  .result-approved .prob-value { color: var(--green-text); }
  .result-rejected .prob-value { color: var(--red-text); }

  .conf-wrap { margin-top: 0.75rem; }
  .conf-label {
    font-family: 'Courier New', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .result-approved .conf-label { color: var(--green-fill); }
  .result-rejected .conf-label { color: var(--red-fill); }
  .bar-track { height: 5px; background: rgba(0,0,0,0.1); border-radius: 100px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 100px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
  .result-approved .bar-fill { background: var(--green-fill); }
  .result-rejected .bar-fill { background: var(--red-fill); }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 520px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 26px; }
  }
  @media (max-width: 380px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<nav class="navbar">
  <a class="nav-brand" href="/"><div class="nav-brand-dot"></div> LoanPredict</a>
  <div class="nav-right">
    <span class="nav-user">Signed in as <span id="navName">…</span></span>
    <button class="nav-logout" onclick="doLogout()">Sign out</button>
  </div>
</nav>

<div class="app">

  <div class="header">
    <div class="logo"><span class="logo-dot"></span> XGBoost · 93.72% accuracy</div>
    <h1>Loan Approval Predictor</h1>
    <p class="tagline">Powered by a real trained credit risk model</p>
  </div>

  <!-- Personal Info -->
  <div class="card">
    <div class="card-title">Personal information</div>
    <div class="grid grid-2">
      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="e.g. 28" min="18" max="100">
      </div>
      <div class="field">
        <label for="income">Annual income ($)</label>
        <input type="number" id="income" placeholder="e.g. 60000" min="0" oninput="calcPct()">
      </div>
      <div class="field">
        <label for="emp_length">Employment length (yrs)</label>
        <input type="number" id="emp_length" placeholder="e.g. 5" min="0" max="60" step="0.5">
      </div>
      <div class="field">
        <label for="home">Home ownership</label>
        <select id="home">
          <option value="">Select…</option>
          <option value="RENT">Rent</option>
          <option value="OWN">Own</option>
          <option value="MORTGAGE">Mortgage</option>
          <option value="OTHER">Other</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Loan Details -->
  <div class="card">
    <div class="card-title">Loan details</div>
    <div class="grid grid-3">
      <div class="field">
        <label for="loan_amnt">Loan amount ($)</label>
        <input type="number" id="loan_amnt" placeholder="e.g. 15000" min="500" oninput="calcPct()">
      </div>
      <div class="field">
        <label for="loan_intent">Purpose</label>
        <select id="loan_intent">
          <option value="">Select…</option>
          <option value="PERSONAL">Personal</option>
          <option value="EDUCATION">Education</option>
          <option value="MEDICAL">Medical</option>
          <option value="VENTURE">Venture</option>
          <option value="HOMEIMPROVEMENT">Home improvement</option>
          <option value="DEBTCONSOLIDATION">Debt consolidation</option>
        </select>
      </div>
      <div class="field">
        <label for="cibil">CIBIL score (300–900)</label>
        <input type="number" id="cibil" placeholder="e.g. 720" min="300" max="900">
      </div>
      <div class="field">
        <label for="int_rate">Interest rate (%)</label>
        <input type="number" id="int_rate" placeholder="e.g. 11.5" step="0.01" min="0" max="100">
      </div>
      <div class="field" style="grid-column: span 2;">
        <label>Loan as % of income <span style="font-size:11px;color:var(--text-hint)">(auto-calculated)</span></label>
        <input type="text" id="pct_income_display" readonly placeholder="Fill salary + loan amount above" style="background:var(--bg);color:var(--text-muted);cursor:default;">
        <input type="hidden" id="pct_income">
      </div>
    </div>
  </div>

  <!-- Credit History -->
  <div class="card">
    <div class="card-title">Credit history</div>
    <div class="grid grid-2">
      <div class="field">
        <label for="default_on_file">Prior default on file</label>
        <select id="default_on_file">
          <option value="">Select…</option>
          <option value="N">No</option>
          <option value="Y">Yes</option>
        </select>
      </div>
      <div class="field">
        <label for="cred_hist">Credit history length (yrs)</label>
        <input type="number" id="cred_hist" placeholder="e.g. 4" min="0" max="60">
      </div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="predict()">
    Assess application
  </button>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-top">
      <div class="result-icon" id="rIcon"></div>
      <div>
        <div class="result-verdict" id="rVerdict"></div>
        <div class="result-headline" id="rHeadline"></div>
      </div>
    </div>
    <div class="prob-grid">
      <div class="prob-box">
        <div class="prob-label">Default risk</div>
        <div class="prob-value" id="rRisk"></div>
      </div>
      <div class="prob-box">
        <div class="prob-label">Repayment likelihood</div>
        <div class="prob-value" id="rSafe"></div>
      </div>
    </div>
    <div class="conf-wrap">
      <div class="conf-label">Model confidence</div>
      <div class="bar-track"><div class="bar-fill" id="rBar" style="width:0%"></div></div>
    </div>
  </div>

</div>

<script>
async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

async function loadUser() {
  try {
    const res = await fetch('/api/me');
    if (res.status === 401) { window.location.href = '/login'; return; }
    const data = await res.json();
    document.getElementById('navName').textContent = data.name;
  } catch { window.location.href = '/login'; }
}

loadUser();

function calcPct() {
  const income = parseFloat(document.getElementById('income').value);
  const loan   = parseFloat(document.getElementById('loan_amnt').value);
  const display = document.getElementById('pct_income_display');
  const hidden  = document.getElementById('pct_income');
  if (income > 0 && loan > 0) {
    const pct = (loan / income).toFixed(4);
    hidden.value = pct;
    display.value = (loan / income * 100).toFixed(1) + '% of annual income';
  } else {
    hidden.value = '';
    display.value = '';
  }
}

function cibilToGrade(score) {
  if (score >= 800) return 'A';
  if (score >= 740) return 'B';
  if (score >= 680) return 'C';
  if (score >= 620) return 'D';
  if (score >= 560) return 'E';
  if (score >= 500) return 'F';
  return 'G';
}

async function predict() {
  const ids = ['age','income','home','emp_length','loan_intent','cibil','loan_amnt','int_rate','pct_income','default_on_file','cred_hist'];
  const vals = {};
  for (const id of ids) {
    const el = document.getElementById(id);
    if (!el.value) { alert('Please fill in all fields.'); el.focus(); return; }
    vals[id] = el.value;
  }
  // Convert CIBIL to loan grade
  vals['loan_grade'] = cibilToGrade(parseInt(vals['cibil']));
  delete vals['cibil'];

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analysing…';

  const rc = document.getElementById('resultCard');
  rc.style.display = 'none';

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(vals)
    });
    const data = await res.json();
    if (data.error) { alert('Error: ' + data.error); return; }

    const approved = data.decision === 'APPROVED';
    rc.className = 'result-card ' + (approved ? 'result-approved' : 'result-rejected');
    rc.style.display = 'block';

    document.getElementById('rIcon').textContent = approved ? '✓' : '✕';
    document.getElementById('rVerdict').textContent = 'Decision';
    document.getElementById('rHeadline').textContent = approved ? 'Application approved' : 'Application rejected';
    document.getElementById('rRisk').textContent = data.prob_default + '%';
    document.getElementById('rSafe').textContent = data.prob_safe + '%';

    setTimeout(() => {
      document.getElementById('rBar').style.width = data.confidence + '%';
    }, 80);

  } catch(e) {
    alert('Could not reach server. Make sure Flask is running on port 5000.');
  }

  btn.disabled = false;
  btn.textContent = 'Assess application';
}
</script>
</body>
</html>
